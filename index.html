<!DOCTYPE html>
<html>
<head>
    <title>Kasir Mini Market</title>
    <style>
        body {
            font-family: Arial;
            background: #f0f2f5;
            padding: 20px;
        }

        .container {
            background: white;
            max-width: 500px;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
        }

        button {
            padding: 10px;
            width: 100%;
            margin-top: 10px;
            background: #28a745;
            color: white;
            border: none;
            cursor: pointer;
        }

        select, input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
        }

        .struk {
            margin-top: 20px;
            background: #eee;
            padding: 10px;
            border-radius: 5px;
        }

        .item {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🧾 Kasir Mini Market</h2>

    <label>Pilih Barang</label>
    <select id="barang">
        <option value="Buku|10000">Buku - 10.000</option>
        <option value="Pensil|3000">Pensil - 3.000</option>
        <option value="Pulpen|5000">Pulpen - 5.000</option>
        <option value="Penghapus|2000">Penghapus - 2.000</option>
    </select>

    <label>Jumlah</label>
    <input type="number" id="qty" value="1">

    <button onclick="tambah()">Tambah</button>

    <div class="struk" id="struk">
        <h3>Struk Belanja</h3>
        <div id="list"></div>
        <hr>
        <h3 id="total">Total: Rp 0</h3>
    </div>
</div>

<script>
let keranjang = [];

function tambah() {
    let data = document.getElementById("barang").value.split("|");
    let nama = data[0];
    let harga = parseInt(data[1]);
    let qty = parseInt(document.getElementById("qty").value);

    keranjang.push({nama, harga, qty});

    tampil();
}

function tampil() {
    let list = "";
    let total = 0;

    keranjang.forEach(item => {
        let subtotal = item.harga * item.qty;
        total += subtotal;

        list += "<div class='item'>" +
            item.nama + " x " + item.qty +
            " = Rp " + subtotal +
            "</div>";
    });

    document.getElementById("list").innerHTML = list;
    document.getElementById("total").innerHTML = "Total: Rp " + total;
}
</script>

</body>
</html>
