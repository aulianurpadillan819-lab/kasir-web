<!DOCTYPE html>
<html>
<head>
    <title>Aplikasi Kasir</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 20px;
            max-width: 400px;
            margin: auto;
            border-radius: 10px;
        }

        button {
            padding: 10px;
            margin-top: 10px;
            width: 100%;
            background: green;
            color: white;
            border: none;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
        }

        #hasil {
            margin-top: 20px;
            background: #eee;
            padding: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Kasir Sederhana</h2>

    <label>Nama Barang</label>
    <input type="text" id="barang">

    <label>Harga</label>
    <input type="number" id="harga">

    <label>Jumlah</label>
    <input type="number" id="qty">

    <button onclick="hitung()">Hitung Total</button>

    <div id="hasil"></div>
</div>

<script>
function hitung() {
    let barang = document.getElementById("barang").value;
    let harga = parseInt(document.getElementById("harga").value);
    let qty = parseInt(document.getElementById("qty").value);

    let total = harga * qty;

    let diskon = 0;
    if (total >= 50000) {
        diskon = total * 0.1;
    }

    let bayar = total - diskon;

    document.getElementById("hasil").innerHTML =
        "<h3>STRUK BELANJA</h3>" +
        "Barang: " + barang + "<br>" +
        "Total: Rp " + total + "<br>" +
        "Diskon: Rp " + diskon + "<br>" +
        "Bayar: Rp " + bayar;
}
</script>

</body>
</html>
