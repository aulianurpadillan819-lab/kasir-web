<!DOCTYPE html>
<html>

<head>

<title>Aplikasi Kasir</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:20px;
}

.box{
max-width:450px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
}

input,select,button{
width:100%;
padding:10px;
margin-top:10px;
}

button{
background:#1f7aff;
color:white;
border:none;
border-radius:5px;
}

table{
width:100%;
margin-top:15px;
}

td{
padding:5px;
}

</style>

</head>

<body>

<div class="box">

<h1>🛒 Aplikasi Kasir</h1>

<select id="barang">

<option value="10000">Buku - Rp10.000</option>

<option value="3000">Pensil - Rp3.000</option>

<option value="5000">Pulpen - Rp5.000</option>

<option value="2000">Penghapus - Rp2.000</option>

</select>

<input
type="number"
id="jumlah"
placeholder="Jumlah">

<button onclick="tambahBarang()">
Tambah Barang
</button>

<table id="list"></table>

<h2 id="total">
Total : Rp0
</h2>

<input
type="number"
id="bayar"
placeholder="Uang Bayar">

<button onclick="bayarKasir()">
Bayar
</button>

<button onclick="resetData()">
Reset
</button>

<div id="struk"></div>

</div>

<script>

let data=[];

function hitungTotal(){

let total=0;

for(let i=0;i<data.length;i++){

total+=data[i].subtotal;

}

document
.getElementById("total")
.innerHTML=
"Total : Rp"+total;

return total;

}

function tambahBarang(){

let pilih=
document
.getElementById("barang");

let nama=
pilih.options[
pilih.selectedIndex
].text;

let harga=
Number(
pilih.value
);

let jumlah=
Number(
document
.getElementById(
"jumlah"
).value
);

if(jumlah<=0){

return;

}

data.push({

nama:nama,

jumlah:jumlah,

subtotal:
harga*jumlah

});

tampil();

document
.getElementById(
"jumlah"
).value="";

}

function tampil(){

let html="";

for(
let i=0;
i<data.length;
i++
){

html+=`

<tr>

<td>
${data[i].nama}
</td>

<td>
${data[i].jumlah}
</td>

<td>
Rp${data[i].subtotal}
</td>

</tr>

`;

}

document
.getElementById(
"list"
)
.innerHTML=
html;

hitungTotal();

localStorage
.setItem(
"riwayat",
JSON.stringify(
data
));

}

function bayarKasir(){

let total=
hitungTotal();

let bayar=
Number(
document
.getElementById(
"bayar"
).value
);

let kembali=
bayar-total;

document
.getElementById(
"struk"
).innerHTML=

`
<h2>🧾 STRUK</h2>

Total :
Rp${total}

<br><br>

Bayar :
Rp${bayar}

<br><br>

Kembalian :
Rp${kembali}

`;

}

function resetData(){

data=[];

document
.getElementById(
"list"
).innerHTML="";

document
.getElementById(
"struk"
).innerHTML="";

document
.getElementById(
"jumlah"
).value="";

document
.getElementById(
"bayar"
).value="";

document
.getElementById(
"total"
).innerHTML=
"Total : Rp0";

localStorage
.clear();

}

window.onload=
function(){

let simpan=
localStorage
.getItem(
"riwayat"
);

if(simpan){

data=
JSON.parse(
simpan
);

tampil();

}

}

</script>

</body>

</html>
